name: Release

# Push a tag like v0.1.0 to publish that version:
#   - publishes the crate to crates.io (needs the CARGO_REGISTRY_TOKEN secret)
#   - builds release binaries and attaches them to a GitHub Release
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  verify:
    name: clippy + test + version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

      - name: CHANGELOG has a section for this tag
        run: |
          if ! grep -q "^## ${GITHUB_REF_NAME}\( \|$\)" CHANGELOG.md; then
            echo "CHANGELOG.md has no \"## ${GITHUB_REF_NAME}\" section" >&2
            exit 1
          fi

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  publish:
    name: publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo publish
        # Idempotent: a re-pushed tag (e.g. to re-run a failed later job) must
        # not fail the run just because this version is already on crates.io.
        run: |
          if out="$(cargo publish 2>&1)"; then
            echo "$out"
          else
            echo "$out"
            if echo "$out" | grep -qi "already uploaded\|already exists"; then
              echo "version already on crates.io — continuing"
            else
              exit 1
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  binaries:
    name: build ${{ matrix.target }}
    needs: verify
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: >
          tar -C target/${{ matrix.target }}/release -czf
          iris-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz iris

      - uses: actions/upload-artifact@v4
        with:
          name: iris-${{ matrix.target }}
          path: iris-*.tar.gz

  release:
    name: GitHub release
    needs: [publish, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract this version's CHANGELOG section
        run: |
          awk -v tag="${GITHUB_REF_NAME}" '
            $0 ~ "^## " tag "( |$)" { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-body.md

      - uses: softprops/action-gh-release@v2
        with:
          files: iris-*.tar.gz
          body_path: release-body.md
          append_body: true
          generate_release_notes: true
